<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Students plcaement prediction </title>
    </head>
    <style>
        
        body {
            background-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }
        .form-group{
            margin-bottom:1rem
        }
       
        input[type=number],input[type=email], input[type=password],input[type=text]{
            padding : 2px;
            border  : 3px solid white;
            background-color : rgb(115, 234, 250)

        }
        .glow {
                font-size: 25px;
                color: #0ee4eb;
                text-align: center;
                animation: glow 1s ease-in-out infinite alternate;
            }
            @-webkit-keyframes glow {
                from {
                    text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #1adef8e3, 0 0 40px #1adef8e3, 0 0 50px #1adef8e3, 0 0 60px #1adef8e3, 0 0 70px #1adef8e3;
                }
  
                to {
                    text-shadow: 0 0 20px #fff, 0 0 30px #e7dee2, 0 0 40px #557deb, 0 0 50px #557deb, 0 0 60px #557deb, 0 0 70px #557deb, 0 0 80px #557deb;
                }
            }
            button{
                text-align : center;
                color : #1ff7f7;
                width : 20%;
                background-color : rgb(7, 47, 51);
                animation : glow 1s ease-in-out infinite alternate;
            }

    </style>
    <body>
        <center>
            <h1 class="glow">Student placement predicition form</h1>
            <form action="/pl" method="POST">
                <div class="form-group">
                    
                    <input type="text" id="Name" name="Name" placeholder="Ashok" required />
                    <br><br>
                </div>

                <div class="form-group">
                    
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
                    <br><br>
                </div>
                <div class="form-group">
                    
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
                    <br><br>

                </div>
                <a href="{{ url_for('predict') }}"><button class="btn btn-primary" type="button">Log in →</button></a>
                <br><br>
            </form>
        </center>
    </body>
    <footer>
        <center>
            <h4 class="glow"> Everyone can access once Login |  Powered by deep Learning</h4>
        </center>
    </fotter>
</html>
